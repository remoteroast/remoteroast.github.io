name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true

      - name: Build Jekyll site
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Validate exactly one hero post
        run: |
          count=$(grep -rl "^hero: true" _posts/ | wc -l | tr -d ' ')
          if [ "$count" -ne 1 ]; then
            echo "ERROR: Expected exactly 1 post with hero: true, found $count"
            exit 1
          fi
          echo "Hero check passed ($count post with hero: true)"
