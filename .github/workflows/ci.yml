name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'
          bundler-cache: true

      - name: Build Jekyll site
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Check HTML (internal links + images)
        run: |
          bundle exec htmlproofer _site \
            --disable-external \
            --no-enforce-https \
            --ignore-urls "/feed.xml" \
            --ignore-files "_site/404.html,_site/Welcome/index.html,_site/about.html"
