---
layout: default
title: Archive
---

<div class="container">
  <div style="padding: 48px 0;">
    <p class="meta" style="margin-bottom: 8px;">{{ page.type | capitalize }}</p>
    <h1 style="margin-bottom: 32px;">{{ page.title }}</h1>
    <div class="verdicts__grid">
      {% for post in page.posts %}
        {% include shop-card.html post=post idx=forloop.index %}
      {% endfor %}
    </div>
  </div>
</div>
