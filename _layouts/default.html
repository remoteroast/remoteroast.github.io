<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.name }}</title>
  {% seo %}
  <link rel="icon" href="{{ '/assets/images/logo.png' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  {% include ga4.html %}
</head>
<body class="layout-{{ page.layout | default: 'page' }}">
  {% include blob-bg.html %}
  {% include nav.html %}
  <main class="site-content">
    {{ content }}
  </main>
  {% include footer.html %}
  <script src="{{ '/assets/js/parallax.js' | relative_url }}" defer></script>
</body>
</html>
